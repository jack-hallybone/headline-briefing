name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pinned dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile sources
        run: python -m py_compile fetch.py fetch_wiki_current_events.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -t .

  # Fails a PR that introduces a dependency with a known vulnerability.
  # Needs the dependency graph, which is on by default for public repositories.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
