name: Fetch latest headlines and deploy

on:
  schedule:
    - cron: '13 06 * * *'   # 06:13 UTC (offset from the hour)
    - cron: '13 11 * * *'   # 11:13 UTC
    - cron: '13 16 * * *'   # 16:13 UTC
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pinned dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds into a fresh build directory
        run: |
          mkdir -p build/data
          cp index.html build/
          cp favicon.svg favicon-dark.svg build/
          python fetch.py --out build/data/data.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'
          retention-days: 1

      - id: deployment
        uses: actions/deploy-pages@v4
