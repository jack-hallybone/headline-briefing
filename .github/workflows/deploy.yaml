name: Fetch latest headlines and deploy

on:
  schedule:
    - cron: '13 06 * * *'   # 06:13 UTC (offset from the hour)
    - cron: '13 11 * * *'   # 11:13 UTC
    - cron: '13 16 * * *'   # 16:13 UTC
  workflow_dispatch: {}
  push:
    branches: [main]

# No workflow-wide privileges: each job is granted only what it needs (below).
permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # Fetches untrusted feed content, so it runs read-only with no deploy or OIDC
  # token. Its only output is the Pages artifact.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pinned dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds into a fresh build directory
        run: |
          mkdir -p build/data
          cp index.html app.js build/
          cp favicon.svg favicon-dark.svg build/
          python fetch.py --out build/data/data.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'
          retention-days: 1

  # Deploys the trusted artifact only — it never runs feed-fetching code, so the
  # pages-write and OIDC permissions are isolated from that surface.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5

      - id: deployment
        uses: actions/deploy-pages@v4
